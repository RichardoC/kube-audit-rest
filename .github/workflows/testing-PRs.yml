name: Test PRs
on:
  pull_request:
    types:
      - labeled
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

# Explicitly grant the `secrets.GITHUB_TOKEN` no permissions.
permissions: {}
jobs:
  AMD-test-via-docker:
    name: AMD64 - Build and test via Docker 🐳 images 📦
    runs-on: ubuntu-latest
    steps:
      - name: Setup Action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@2ae358d897a79d8c08e086f833a3d537bc2dac22 # tag v3.11.1
      - name: Build alpine based image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # tag v6.18.0
        with:
          file: Dockerfile-alpine
          context: .
          push: false # DO NOT PUSH AS UNTRUSTED
          tags: |
            ghcr.io/richardoc/kube-audit-rest:test-alpine
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build distroless image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # tag v6.18.0
        with:
          file: Dockerfile-distroless
          context: .
          push: false # DO NOT PUSH AS UNTRUSTED
          tags: |
            ghcr.io/richardoc/kube-audit-rest:test-distroless
            ghcr.io/richardoc/kube-audit-rest:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
  ARM-test-via-docker:
    name: ARM64 - Build and test via Docker 🐳 images 📦
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Setup Action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@2ae358d897a79d8c08e086f833a3d537bc2dac22 # tag v3.11.1
      - name: Build alpine based image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # tag v6.18.0
        with:
          file: Dockerfile-alpine
          context: .
          push: false # DO NOT PUSH AS UNTRUSTED
          tags: |
            ghcr.io/richardoc/kube-audit-rest:test-alpine
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build distroless image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # tag v6.18.0
        with:
          file: Dockerfile-distroless
          context: .
          push: false # DO NOT PUSH AS UNTRUSTED
          tags: |
            ghcr.io/richardoc/kube-audit-rest:test-distroless
            ghcr.io/richardoc/kube-audit-rest:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
  execute-unittests:
    name: Execute the unittests
    runs-on: ubuntu-latest
    steps:
      - name: Setup Action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0

      - name: Set up Go
        uses: actions/setup-go@27fdb267c15a8835f1ead03dfa07f89be2bb741a # tag v6.0.0
        with:
          go-version: 1.26

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
  run-trivy:
    name: Run trivy
    runs-on: ubuntu-latest
    steps:
      - name: Setup Action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # tag 0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "repo-results.sarif"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
  run-semgrep:
    name: Run Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Setup Action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@2ae358d897a79d8c08e086f833a3d537bc2dac22 # tag v3.11.1
      - name: Run semgrep
        # excluding yamls due to false positives with the elasticsearch example for now
        run: docker run --rm -v "${PWD}:/src" returntocorp/semgrep:1.48.0-nonroot@sha256:572b06425becea5b9b26bcd01f78553383ab052debfeb2c57720cebd6999d964 semgrep ci --config auto  --exclude=*.yaml
