name: Run per commit workflows

on:
  push:
    branches:
      - "main"

jobs:
  AMD64-build-and-publish-to-ghcr:
    # Explicitly grant the `secrets.GITHUB_TOKEN` permissions.
    permissions:
      # Grant the ability to write to GitHub Packages (push Docker images to
      # GitHub Container Registry).
      packages: write
      # For uploading attestations
      attestations: write
      # For OICD?  https://github.com/actions/deploy-pages/issues/329
      id-token: write

    name: Build and publish AMD64 and ARM64 container images 📦 to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # tag v5.0.0
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@4378dc6be7f72231dfe78ac7e0364a44f1c9f54b # tag v5.8.0
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@6804d313191b81cfc5feb5065848250370954232 # tag v3.6.0
        with:
          platforms: "arm64"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@172dff065fb2e54aaed577fd667975cd412819fb # tag v3.11.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@5c42dd293b89d96bae168b5b3694e4e72a5b1117 # tag v3.6.0
        with:
          registry: ghcr.io
          # This is the user that triggered the Workflow. In this case, it will
          # either be the user whom created the Release or manually triggered
          # the workflow_dispatch.
          username: ${{ github.actor }}
          # `secrets.GITHUB_TOKEN` is a secret that's automatically generated by
          # GitHub Actions at the start of a workflow run to identify the job.
          # This is used to authenticate against GitHub Container Registry.
          # See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#about-the-github_token-secret
          # for more detailed information.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push alpine based image
        id: alpine-image
        uses: docker/build-push-action@c5117b60bc829f00aaacb038e99de2712bee6e6e # tag v6.18.0
        with:
          file: Dockerfile-alpine
          context: .
          push: true # push the image to ghcr
          tags: |
            ghcr.io/richardoc/kube-audit-rest:${{github.sha}}-alpine
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - name: Attest alpine based image
        id: attest-alpine
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275 # tag v3.0.0
        with:
          subject-name: ghcr.io/richardoc/kube-audit-rest
          subject-digest: ${{ steps.alpine-image.outputs.digest }}
          push-to-registry: true
      - name: Build and push distroless image
        id: distroless-image
        uses: docker/build-push-action@c5117b60bc829f00aaacb038e99de2712bee6e6e # tag v6.18.0
        with:
          file: Dockerfile-distroless
          context: .
          push: true # push the image to ghcr
          tags: |
            ghcr.io/richardoc/kube-audit-rest:${{github.sha}}-distroless
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - name: Attest distroless based image
        id: attest-distroless
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275 # tag v3.0.0
        with:
          subject-name: ghcr.io/richardoc/kube-audit-rest
          subject-digest: ${{ steps.distroless-image.outputs.digest }}
          push-to-registry: true
